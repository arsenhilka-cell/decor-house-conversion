<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Відстеження конверсії — Decor House</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--y:#F0C000;--yl:#FFF8D6;--blk:#1A1A1A;--bg:#F7F6F2;--wh:#fff;--br:#E5E3DB;--tx:#1A1A1A;--mt:#7A7870;--r:10px;--green:#1D9E75;--red:#D85A30;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}

.topbar{background:var(--blk);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--y);}
.logo-text{color:#fff;font-size:13px;font-weight:700;}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-top:1px;}
.page-title{color:#fff;font-size:16px;font-weight:700;}

.main-nav{background:var(--wh);border-bottom:1px solid var(--br);padding:0 28px;display:flex;align-items:center;gap:0;}
.tab-btn{padding:14px 22px;font-size:13px;font-weight:500;color:var(--mt);border:none;background:none;cursor:pointer;font-family:'Manrope',sans-serif;border-bottom:3px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:var(--blk);border-bottom-color:var(--y);font-weight:700;}
.tab-btn:hover:not(.active){color:var(--blk);}

.period-nav{background:var(--wh);border-bottom:1px solid var(--br);padding:10px 28px;display:flex;align-items:center;gap:8px;}
.period-btn{padding:6px 18px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--br);background:var(--bg);color:var(--mt);font-family:'Manrope',sans-serif;transition:all 0.15s;}
.period-btn.active{background:var(--blk);color:#fff;border-color:var(--blk);}

.content{padding:20px 28px 40px;}

.top3-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.top3-card{background:var(--wh);border:0.5px solid var(--br);border-radius:var(--r);padding:14px 16px;}
.top3-card-title{font-size:10px;font-weight:500;color:var(--mt);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.top3-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;margin-bottom:5px;}
.top3-item:last-child{margin-bottom:0;}
.top3-item.best{background:#F0FBF5;}
.top3-item.worst{background:#FFF0EE;}
.top3-rank{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.rank-1{background:var(--y);color:var(--blk);}
.rank-2{background:#D3D1C7;color:#444;}
.rank-3{background:#E5E3DB;color:#555;}
.rank-bad{background:#FCEBEB;color:#A32D2D;}
.top3-name{flex:1;font-size:12px;font-weight:500;}
.top3-conv{font-size:13px;font-weight:700;}

table{width:100%;border-collapse:collapse;background:var(--wh);border:0.5px solid var(--br);border-radius:var(--r);overflow:hidden;}
th{padding:9px 10px;font-size:10px;font-weight:500;color:var(--mt);text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid var(--br);background:var(--bg);text-align:left;white-space:nowrap;}
td{padding:0;border-bottom:0.5px solid var(--br);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF7;}
.cell{display:block;padding:8px 10px;font-size:12px;}
.editable{width:100%;border:none;background:transparent;font-size:12px;color:var(--tx);font-family:'Manrope',sans-serif;padding:7px 10px;outline:none;cursor:pointer;}
.editable:focus{background:var(--yl);border-radius:4px;}
.editable:hover:not(:focus){background:var(--yl);opacity:0.7;border-radius:4px;}
input[type=number].editable{-moz-appearance:textfield;}
input[type=number].editable::-webkit-inner-spin-button{-webkit-appearance:none;}
.del-btn{width:28px;height:28px;border-radius:7px;border:1px solid #F0C5C0;background:#FFF0EE;color:#D85A30;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;}
.del-btn:hover{background:#FCEBEB;}
.act-cell{display:flex;align-items:center;justify-content:center;padding:5px;}
.plan-plus{color:var(--green);font-weight:700;font-size:12px;}
.plan-minus{color:var(--red);font-weight:700;font-size:12px;}
.plan-ok{color:var(--mt);font-weight:500;font-size:12px;}
.ch-row td{background:#FAFAF7;}
.total-row td{background:var(--yl);}
.total-row .cell{font-weight:700;}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:var(--y);color:var(--blk);border:none;font-family:'Manrope',sans-serif;margin-top:12px;}
.ch-icon{font-size:14px;margin-right:4px;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--mt);margin:20px 0 10px;display:flex;align-items:center;gap:6px;}

/* Table alignment */
.sorter-table,.manager-table{table-layout:fixed;}
.sorter-table .num-input{text-align:left;}
.manager-table{table-layout:fixed;}
.manager-table .manager-name-cell{background:#FAFAF7;}
.manager-table .manager-name-cell .editable{font-weight:600;}
.manager-table .channel-name{font-weight:500;padding-left:10px;}
.manager-table .total-label{font-weight:700;padding-left:10px;}
.manager-table .num-input{text-align:left;}

.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--wh);border-radius:var(--r);padding:22px;width:320px;border:0.5px solid var(--br);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal label{font-size:11px;color:var(--mt);display:block;margin-bottom:4px;margin-top:10px;}
.modal input{width:100%;padding:7px 10px;border:0.5px solid var(--br);border-radius:7px;font-size:12px;font-family:'Manrope',sans-serif;background:var(--yl);outline:none;}
.modal input:focus{border-color:var(--y);}
.modal-footer{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn-cancel{padding:6px 14px;border-radius:7px;font-size:12px;background:var(--bg);border:0.5px solid var(--br);cursor:pointer;font-family:'Manrope',sans-serif;}
.btn-save{padding:6px 14px;border-radius:7px;font-size:12px;background:var(--y);border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-weight:500;}
</style>
</head>

  <button class="period-btn" id="btnMonth" onclick="switchPeriod('month')">Місяць</button>

  <div class="modal">

    <label>Ім'я</label>
    <input type="text" id="mName" placeholder="Ім'я">
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Скасувати</button>
      <button class="btn-save" onclick="saveModal()">Зберегти</button>
    </div>
  </div>
</div>

<script>
const CHANNELS = [
  {id:'instagram', name:'Instagram', icon:'ti-brand-instagram', color:'#E8593C'},
  {id:'facebook',  name:'Facebook',  icon:'ti-brand-facebook',  color:'#185FA5'},
  {id:'tiktok',    name:'TikTok',    icon:'ti-brand-tiktok',    color:'#2D9E3A'},
];

const SORTER_PLAN = 50;
const MGR_PLAN = 15;

let currentTab = 'sorters';
let currentPeriod = 'week';

let data = {
  sorters: {
    week: [
      {id:1,name:'Ірина 8',leads:64,passed:45,orders:0},
      {id:2,name:'Марія 3',leads:58,passed:38,orders:0},
      {id:3,name:'Оксана 5',leads:71,passed:44,orders:0},
      {id:4,name:'Катя 2',leads:33,passed:10,orders:0},
    ],
    month: [
      {id:1,name:'Ірина 8',leads:280,passed:190,orders:0},
      {id:2,name:'Марія 3',leads:240,passed:155,orders:0},
      {id:3,name:'Оксана 5',leads:310,passed:180,orders:0},
      {id:4,name:'Катя 2',leads:140,passed:42,orders:0},
    ]
  },
  managers: {
    week: [
      {id:1,name:'Поліна Одеса',channels:{instagram:{leads:10,orders:4},facebook:{leads:8,orders:3},tiktok:{leads:5,orders:2}}},
      {id:2,name:'Настя Одеса', channels:{instagram:{leads:15,orders:5},facebook:{leads:6,orders:2},tiktok:{leads:8,orders:3}}},
    ],
    month: [
      {id:1,name:'Поліна Одеса',channels:{instagram:{leads:45,orders:18},facebook:{leads:32,orders:12},tiktok:{leads:22,orders:9}}},
      {id:2,name:'Настя Одеса', channels:{instagram:{leads:60,orders:20},facebook:{leads:25,orders:8},tiktok:{leads:34,orders:12}}},
    ]
  }
};

function sConv(s){ return s.leads ? Math.round(s.passed/s.leads*100) : 0; }
function sPlan(c){ const d=c-SORTER_PLAN; return d; }
function mConvTotal(m){
  let tl=0,to=0;
  CHANNELS.forEach(ch=>{
    const chData = (m.channels && m.channels[ch.id]) ? m.channels[ch.id] : {leads:0,orders:0};
    tl += Number(chData.leads) || 0;
    to += Number(chData.orders) || 0;
  });
  return tl ? Math.round(to/tl*100) : 0;
}
function mConvCh(ch){ return ch.leads ? Math.round(ch.orders/ch.leads*100) : 0; }
function planHtml(conv, target){
  const d = conv - target;
  if(d>0) return `<span class="plan-plus">+${d}%</span>`;
  if(d<0) return `<span class="plan-minus">${d}%</span>`;
  return `<span class="plan-ok">0%</span>`;
}

function normalizeData(){
  ['week','month'].forEach(p=>{
    if(!data.sorters[p]) data.sorters[p] = [];
    if(!data.managers[p]) data.managers[p] = [];
    data.sorters[p].forEach(s=>{ if(s.orders===undefined) s.orders = 0; });
    data.managers[p].forEach(m=>{
      if(!m.channels) m.channels = {};
      CHANNELS.forEach(ch=>{
        if(!m.channels[ch.id]) m.channels[ch.id] = {leads:0,orders:0};
        if(m.channels[ch.id].leads===undefined) m.channels[ch.id].leads = 0;
        if(m.channels[ch.id].orders===undefined) m.channels[ch.id].orders = 0;
      });
    });
  });
}

function switchTab(tab, el){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function switchPeriod(p){
  currentPeriod=p;
  document.getElementById('btnWeek').classList.toggle('active',p==='week');
  document.getElementById('btnMonth').classList.toggle('active',p==='month');
  render();
}

function render(){
  normalizeData();
  if(currentTab==='sorters') renderSorters();
  else renderManagers();
}

function renderSorters(){
  const list = data.sorters[currentPeriod];
  const withConv = list.map(s=>({...s,cv:sConv(s)}));
  const sorted = [...withConv].sort((a,b)=>b.cv-a.cv);
  const top3 = sorted.slice(0,3);
  const bot3 = [...sorted].reverse().slice(0,3);

  let html = `<div class="top3-row">
    <div class="top3-card">
      <div class="top3-card-title"><i class="ti ti-trophy" style="color:#F0C000"></i>Топ 3 найкращих</div>
      ${top3.map((s,i)=>`<div class="top3-item best">
        <div class="top3-rank rank-${i+1}">${i+1}</div>
        <div class="top3-name">${s.name}</div>
        <div class="top3-conv" style="color:var(--green)">${s.cv}%</div>
        ${planHtml(s.cv,SORTER_PLAN)}
      </div>`).join('')}
    </div>
    <div class="top3-card">
      <div class="top3-card-title"><i class="ti ti-alert-triangle" style="color:#D85A30"></i>Топ 3 найгірших</div>
      ${bot3.map((s,i)=>`<div class="top3-item worst">
        <div class="top3-rank rank-bad">!</div>
        <div class="top3-name">${s.name}</div>
        <div class="top3-conv" style="color:var(--red)">${s.cv}%</div>
        ${planHtml(s.cv,SORTER_PLAN)}
      </div>`).join('')}
    </div>
  </div>`;

  html += `<table class="sorter-table">
    <colgroup>
      <col style="width:180px">
      <col style="width:135px">
      <col style="width:170px">
      <col style="width:120px">
      <col style="width:110px">
      <col style="width:105px">
      <col style="width:56px">
    </colgroup>
    <thead><tr>
      <th>Ім'я</th>
      <th>Прийнято лідів</th>
      <th>Передано на менеджера</th>
      <th>Замовлення</th>
      <th>Конверсія</th>
      <th>План (${SORTER_PLAN}%)</th>
      <th></th>
    </tr></thead>
    <tbody>
    ${withConv.map(s=>`<tr>
      <td><input class="editable" value="${s.name}" onchange="updS(${s.id},'name',this.value)" style="font-weight:500"/></td>
      <td><input type="number" class="editable num-input" value="${s.leads}" onchange="updS(${s.id},'leads',+this.value)" min="0"/></td>
      <td><input type="number" class="editable num-input" value="${s.passed}" onchange="updS(${s.id},'passed',+this.value)" min="0"/></td>
      <td><input type="number" class="editable num-input" value="${s.orders ?? 0}" onchange="updS(${s.id},'orders',+this.value)" min="0"/></td>
      <td><span class="cell" style="font-weight:700;color:${s.cv>=SORTER_PLAN?'var(--green)':'var(--red)'}">${s.cv}%</span></td>
      <td><span class="cell">${planHtml(s.cv,SORTER_PLAN)}</span></td>
      <td><div class="act-cell"><button class="del-btn" onclick="delS(${s.id})"><i class="ti ti-trash" style="font-size:13px"></i></button></div></td>
    </tr>`).join('')}
    </tbody>
  </table>
  <button class="add-btn" onclick="openModal('sorter')"><i class="ti ti-plus" style="font-size:13px"></i> Додати сортувальника</button>`;

  document.getElementById('contentArea').innerHTML = html;
}

function renderManagers(){
  const list = data.managers[currentPeriod];

  const withConv = list.map(m=>({...m, totalConv: mConvTotal(m)}));
  const sorted = [...withConv].sort((a,b)=>b.totalConv-a.totalConv);
  const top3 = sorted.slice(0,3);
  const bot3 = [...sorted].reverse().slice(0,3);

  let html = `<div class="top3-row">
    <div class="top3-card">
      <div class="top3-card-title"><i class="ti ti-trophy" style="color:#F0C000"></i>Топ 3 найкращих</div>
      ${top3.map((m,i)=>`<div class="top3-item best">
        <div class="top3-rank rank-${i+1}">${i+1}</div>
        <div class="top3-name">${m.name}</div>
        <div class="top3-conv" style="color:var(--green)">${m.totalConv}%</div>
        ${planHtml(m.totalConv,MGR_PLAN)}
      </div>`).join('')}
    </div>
    <div class="top3-card">
      <div class="top3-card-title"><i class="ti ti-alert-triangle" style="color:#D85A30"></i>Топ 3 найгірших</div>
      ${bot3.map((m,i)=>`<div class="top3-item worst">
        <div class="top3-rank rank-bad">!</div>
        <div class="top3-name">${m.name}</div>
        <div class="top3-conv" style="color:var(--red)">${m.totalConv}%</div>
        ${planHtml(m.totalConv,MGR_PLAN)}
      </div>`).join('')}
    </div>
  </div>`;

  html += `<table class="manager-table">
    <colgroup>
      <col style="width:190px">
      <col style="width:150px">
      <col style="width:130px">
      <col style="width:110px">
      <col style="width:110px">
      <col style="width:105px">
      <col style="width:56px">
    </colgroup>
    <thead><tr>
      <th>Менеджер</th>
      <th>Канал</th>
      <th>Прийнято лідів</th>
      <th>Замовлень</th>
      <th>Конверсія</th>
      <th>План (${MGR_PLAN}%)</th>
      <th></th>
    </tr></thead>
    <tbody>
    ${list.map(m=>{
      let tl=0,to=0;

      const channelRows = CHANNELS.map((ch,idx)=>{
        const chData = m.channels[ch.id] || {leads:0,orders:0};
        const cv = mConvCh(chData);
        tl += Number(chData.leads) || 0;
        to += Number(chData.orders) || 0;

        return `<tr class="ch-row">
          ${idx===0 ? `<td rowspan="${CHANNELS.length+1}" class="manager-name-cell"><input class="editable" value="${m.name}" onchange="updMName(${m.id},this.value)"/></td>` : ``}
          <td><span class="cell channel-name">${ch.name}</span></td>
          <td><input type="number" class="editable num-input" value="${chData.leads}" onchange="updM(${m.id},'${ch.id}','leads',+this.value)" min="0"/></td>
          <td><input type="number" class="editable num-input" value="${chData.orders}" onchange="updM(${m.id},'${ch.id}','orders',+this.value)" min="0"/></td>
          <td><span class="cell" style="font-weight:700;color:${cv>=MGR_PLAN?'var(--green)':'var(--red)'}">${cv}%</span></td>
          <td><span class="cell">${planHtml(cv,MGR_PLAN)}</span></td>
          <td></td>
        </tr>`;
      }).join('');

      const totalConv = tl?Math.round(to/tl*100):0;

      return `${channelRows}
      <tr class="total-row">
        <td><span class="cell total-label">Загально</span></td>
        <td><span class="cell">${tl}</span></td>
        <td><span class="cell">${to}</span></td>
        <td><span class="cell" style="color:${totalConv>=MGR_PLAN?'var(--green)':'var(--red)'}">${totalConv}%</span></td>
        <td><span class="cell">${planHtml(totalConv,MGR_PLAN)}</span></td>
        <td><div class="act-cell"><button class="del-btn" onclick="delM(${m.id})"><i class="ti ti-trash" style="font-size:13px"></i></button></div></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  <button class="add-btn" onclick="openModal('manager')"><i class="ti ti-plus" style="font-size:13px"></i> Додати менеджера</button>`;

  document.getElementById('contentArea').innerHTML = html;
}
let _modalType = '';
function openModal(type){ _modalType=type; document.getElementById('mName').value=''; document.getElementById('modalTitle').textContent=type==='sorter'?'Додати сортувальника':'Додати менеджера'; document.getElementById('modalBg').classList.add('open'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
function saveModal(){
  const name=document.getElementById('mName').value.trim(); if(!name)return;
  const id=Date.now();
  if(_modalType==='sorter'){
    data.sorters.week.push({id,name,leads:0,passed:0,orders:0});
    data.sorters.month.push({id:id+1,name,leads:0,passed:0,orders:0});
  } else {
    const empty={instagram:{leads:0,orders:0},facebook:{leads:0,orders:0},tiktok:{leads:0,orders:0}};
    data.managers.week.push({id,name,channels:JSON.parse(JSON.stringify(empty))});
    data.managers.month.push({id:id+1,name,channels:JSON.parse(JSON.stringify(empty))});
  }
  closeModal(); fbSave(); render();
}

function updS(id,f,v){ const s=data.sorters[currentPeriod].find(x=>x.id===id); if(s){s[f]=v;} fbSave(); render(); }
function delS(id){ if(confirm('Видалити?')){ ['week','month'].forEach(p=>{ data.sorters[p]=data.sorters[p].filter(x=>x.id!==id); }); fbSave(); render(); }}
function updM(id,ch,f,v){ const m=data.managers[currentPeriod].find(x=>x.id===id); if(m){ if(!m.channels) m.channels={}; if(!m.channels[ch]) m.channels[ch]={leads:0,orders:0}; m.channels[ch][f]=v;} fbSave(); render(); }
function updMName(id,v){ ['week','month'].forEach(p=>{ const m=data.managers[p].find(x=>x.id===id); if(m)m.name=v; }); fbSave(); }
function delM(id){ if(confirm('Видалити?')){ ['week','month'].forEach(p=>{ data.managers[p]=data.managers[p].filter(x=>x.id!==id); }); fbSave(); render(); }}

let _fbTimer=null;
function fbSave(){ clearTimeout(_fbTimer); _fbTimer=setTimeout(()=>{ if(window._fbSave) window._fbSave(); },800); }

document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)closeModal();});
render();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAXXBlM7KZEwWyrEAaVc0rW3kOR4t0GT_Q",
  authDomain: "decorodessa-dd310.firebaseapp.com",
  projectId: "decorodessa-dd310",
});
const db = getFirestore(app);
const DOC = "conversion_v1";

function showInd(msg){
  let el=document.getElementById('_ind');
  if(!el){ el=document.createElement('div'); el.id='_ind'; el.style.cssText='position:fixed;bottom:20px;right:20px;background:#1A1A1A;color:#F0C000;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;font-family:Manrope,sans-serif;transition:opacity 0.3s'; document.body.appendChild(el); }
  el.textContent=msg; el.style.opacity='1'; setTimeout(()=>el.style.opacity='0',2000);
}

window._fbSave = async function(){
  try{ await setDoc(doc(db,'conversion',DOC),{data:JSON.parse(JSON.stringify(data)),updatedAt:new Date().toISOString()}); showInd('✓ Збережено'); }
  catch(e){ console.error(e); showInd('⚠ Помилка'); }
};

async function load(){
  try{
    const snap=await getDoc(doc(db,'conversion',DOC));
    if(snap.exists()){
      const d=snap.data();
      if(d.data){ Object.assign(data,d.data); }
      showInd('✓ Дані завантажено');
      render();
    }
  }catch(e){ console.error(e); }
}
load();
</script>
